<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Carrito - TechStore</title>
  
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/tailwind-config.js"></script>
</head>
<body class="bg-[#F9FAFB] text-slate-800 font-sans min-h-screen flex flex-col pt-20">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 fixed top-0 w-full z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
      <a href="index.html" class="font-black text-2xl tracking-tighter flex items-center gap-2 text-slate-900">
        <i class="fa-solid fa-bolt text-brandIndigo"></i> Tech<span class="font-light">Store</span>
      </a>
      <div class="flex items-center gap-6">
        <div class="text-gray-900 relative">
          <i class="fa-solid fa-cart-shopping text-xl text-brandIndigo"></i>
          <span class="absolute -top-2 -right-2 bg-brandIndigo text-white text-[10px] rounded-full w-[18px] h-[18px] flex items-center justify-center font-bold">1</span>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 animate-fade-in max-w-7xl mx-auto px-6 w-full py-12">
    <h1 class="text-3xl font-bold mb-8 text-slate-900">Tu Carrito de Compras</h1>
    
    <div class="flex flex-col lg:flex-row gap-12">
      <!-- Items List -->
      <div class="flex-1">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
          <!-- Item 1 -->
          <div class="flex gap-6 items-center border-b border-gray-100 pb-6 mb-6">
            <div class="w-24 h-24 bg-gray-50 rounded-xl flex items-center justify-center shrink-0">
              <i class="fa-solid fa-headphones text-4xl text-gray-300"></i>
            </div>
            
            <div class="flex-1">
              <div class="flex justify-between items-start mb-1">
                <h3 class="font-bold text-lg text-slate-900">Auriculares Noise-Cancelling Pro</h3>
                <button class="text-gray-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash"></i></button>
              </div>
              <p class="text-xs text-gray-500 mb-3">Color: Midnight Black</p>
              
              <div class="flex justify-between items-center">
                <div class="w-24 bg-gray-50 border border-gray-200 rounded-lg flex items-center justify-between px-2 font-bold select-none h-10">
                  <button class="px-2 text-gray-500 hover:text-brandIndigo">-</button>
                  <span class="text-sm">1</span>
                  <button class="px-2 text-gray-500 hover:text-brandIndigo">+</button>
                </div>
                <span class="font-black text-xl text-slate-900">$299.00</span>
              </div>
            </div>
          </div>
          
          <a href="index.html" class="text-brandIndigo font-semibold text-sm hover:underline"><i class="fa-solid fa-arrow-left mr-2"></i> Continuar comprando</a>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="w-full lg:w-[400px]">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 sticky top-28">
          <h2 class="text-xl font-bold mb-6 text-slate-900">Resumen del Pedido</h2>
          
          <div class="space-y-4 text-sm text-gray-600 mb-6 border-b border-gray-100 pb-6">
            <div class="flex justify-between"><span>Subtotal</span><span class="font-semibold text-slate-900">$299.00</span></div>
            <div class="flex justify-between"><span>Envío estimado</span><span class="font-semibold text-green-500">Gratis</span></div>
            <div class="flex justify-between"><span>Impuestos</span><span class="font-semibold text-slate-900">$23.92</span></div>
          </div>
          
          <div class="flex justify-between items-center mb-8">
            <span class="text-lg font-bold text-slate-900">Total</span>
            <span class="text-3xl font-black text-slate-900">$322.92</span>
          </div>

          <a href="checkout.html" class="block w-full text-center bg-brandIndigo hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-colors mb-4 text-lg">
            Ir al Checkout <i class="fa-solid fa-lock ml-2 text-sm"></i>
          </a>
          
          <div class="flex items-center justify-center gap-2 text-xs text-gray-400">
            <i class="fa-brands fa-cc-visa text-2xl"></i>
            <i class="fa-brands fa-cc-mastercard text-2xl"></i>
            <i class="fa-brands fa-cc-amex text-2xl"></i>
            <i class="fa-brands fa-cc-paypal text-2xl"></i>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    if (window.self !== window.top) {
      document.querySelectorAll('.fixed').forEach(function(el) { el.style.display = 'none'; });
    }
  </script>

</body>
</html>
